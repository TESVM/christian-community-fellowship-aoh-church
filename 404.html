<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page not found · Christian Community Fellowship AOH Church of God</title>
    <meta name="robots" content="noindex" />
    <meta name="theme-color" content="#201512" />
    <link rel="icon" href="images/branding/favicon-64.png" type="image/png" sizes="64x64" />
    <link rel="apple-touch-icon" href="images/branding/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles/main.css" />
    <style>
      .notfound {
        display: grid;
        place-items: center;
        min-height: 100vh;
        padding: 3rem 0;
        text-align: center;
      }
      .notfound-card {
        max-width: 34rem;
      }
      .notfound h1 {
        margin: 1rem 0 0.5rem;
        font-family: var(--font-display);
        font-size: clamp(3rem, 8vw, 5rem);
        line-height: 0.95;
        letter-spacing: -0.03em;
      }
      .notfound p {
        color: var(--muted);
        line-height: 1.7;
        margin: 0 0 2rem;
      }
      .notfound .brand-logo {
        margin: 0 auto;
      }
    </style>
  </head>
  <body>
    <main class="notfound">
      <div class="container notfound-card">
        <img
          class="brand-logo"
          src="images/branding/logo-ccf.png"
          alt="Christian Community Fellowship logo"
          width="64"
          height="64"
        />
        <p class="eyebrow">Page not found</p>
        <h1>We couldn't find that page.</h1>
        <p>
          The page you were looking for may have moved or no longer exists. Let's get you back to
          worship, schedules, and how to connect with the church.
        </p>
        <div class="hero-actions" style="justify-content: center">
          <a class="button button-primary" href="/christian-community-fellowship-aoh-church/">
            Return home
          </a>
          <a class="button button-secondary" href="mailto:ccfaohmission@gmail.com">
            Email the church
          </a>
        </div>
      </div>
    </main>
  </body>
</html>
