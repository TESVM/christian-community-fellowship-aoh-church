# Decap CMS configuration for the Christian Community Fellowship website.
#
# Auth uses DecapBridge (PKCE), so church staff sign in with an email and
# password (no GitHub account needed). Publishing a change commits to this
# repository and Netlify redeploys the site. See ADMIN.md.

# Use DecapBridge PKCE auth (required)
backend:
  name: git-gateway
  repo: TESVM/christian-community-fellowship-aoh-church
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/c6197806-a877-4d29-8f0a-bb75d7bdafde/pkce
  auth_token_endpoint: /sites/c6197806-a877-4d29-8f0a-bb75d7bdafde/token
  gateway_url: https://gateway.decapbridge.com

  # See who did what (optional)
  commit_messages:
    create: Create {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

# Enable PKCE fields (optional, recommended)
auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

# Login-screen branding + site links
logo_url: https://ccfaohc.netlify.app/images/branding/logo-ccf.png
site_url: https://ccfaohc.netlify.app

media_folder: images/uploads
public_folder: /images/uploads

collections:
  - name: site
    label: Website Content
    editor:
      preview: false
    files:
      - name: homepage
        label: Homepage Content
        file: content/site.json
        format: json
        description: Edit the text shown across the church homepage.
        fields:
          - label: Hero
            name: hero
            widget: object
            fields:
              - { label: Background image, name: image, widget: image, required: false, hint: "Wide photo works best. Leave blank to keep the current image." }
              - { label: Eyebrow (small line above heading), name: eyebrow, widget: string }
              - { label: Main heading, name: heading, widget: string }
              - { label: Tagline, name: tagline, widget: string }
              - { label: Primary button text, name: primaryCtaText, widget: string }
              - { label: Primary button link, name: primaryCtaUrl, widget: string }
              - { label: Secondary button text, name: secondaryCtaText, widget: string }

          - label: Office
            name: office
            widget: object
            fields:
              - { label: Office hours, name: hours, widget: string }

          - label: About Section
            name: about
            widget: object
            fields:
              - { label: Heading, name: heading, widget: string }
              - { label: First paragraph, name: body1, widget: text }
              - { label: Second paragraph, name: body2, widget: text }

          - label: Service Schedule
            name: schedule
            widget: object
            fields:
              - { label: Sunday service time, name: sunday, widget: string }
              - { label: Wednesday service time, name: wednesday, widget: string }
              - { label: Schedule note, name: note, widget: text }

          - label: Leadership
            name: leadership
            widget: object
            fields:
              - { label: Pastor name, name: name, widget: string }
              - { label: Pastor bio, name: bio, widget: text }

          - label: Contact
            name: contact
            widget: object
            fields:
              - { label: Address, name: address, widget: string }
              - { label: Phone (display), name: phone, widget: string }
              - { label: Phone link (e.g. tel:+12055670364), name: phoneHref, widget: string }
              - { label: Email (display), name: email, widget: string }
              - { label: Email link (e.g. mailto:name@example.com), name: emailHref, widget: string }
              - { label: Facebook label, name: facebookLabel, widget: string }
              - { label: Facebook URL, name: facebookUrl, widget: string }

          - label: Events & Announcements
            name: announcements
            widget: list
            label_singular: Announcement
            summary: "{{fields.title}}"
            fields:
              - { label: Date / when, name: date, widget: string }
              - { label: Title, name: title, widget: string }
              - { label: Description, name: body, widget: text }
